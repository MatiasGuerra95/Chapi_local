name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/chapi_test
      RESULTS_DIR: /tmp/chapi-results
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest httpx
      - name: Lint
        run: ruff check backend workers --output-format=github
      - name: Test import
        run: python -c "import app.main; print('import OK')"
      - name: Tests (unit + integración)
        run: python -m pytest -q
