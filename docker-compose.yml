services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgpass}
      POSTGRES_DB: ${POSTGRES_DB:-chapi}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      # -d evita el FATAL cosmético "database pguser does not exist": sin -d,
      # pg_isready intenta una base con el nombre del usuario (que no existe).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pguser} -d ${POSTGRES_DB:-chapi}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app/results
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: arq workers.judicial_worker.WorkerSettings
    env_file:
      - .env
    volumes:
      - ./results:/app/results
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  dbdata:
